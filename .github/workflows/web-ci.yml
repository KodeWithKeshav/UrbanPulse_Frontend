name: Frontend Web CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: urbanpulse-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: urbanpulse-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
